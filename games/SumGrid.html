<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #1a1713;
            --surface:   #272320;
            --surface2:  #332e28;
            --cell-bg:   #f2e8d6;
            --cell-text: #23201c;
            --accent:    #c48a30;
            --accent-lt: #dca84e;
            --correct:   #5a9e72;
            --wrong:     #b84848;
            --muted:     #7a6e5e;
            --sep:       #3e3830;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            background-image:
                    radial-gradient(ellipse at 20% 10%, rgba(196,138,48,.08) 0%, transparent 55%),
                    radial-gradient(ellipse at 80% 90%, rgba(90,158,114,.06) 0%, transparent 55%);
            font-family: 'Courier Prime', 'Courier New', monospace;
            color: var(--cell-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 2.5rem;
            gap: 1.4rem;
        }

        /* ── Header ── */
        header { text-align: center; }

        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 900;
            font-size: clamp(2rem, 9vw, 2.8rem);
            letter-spacing: .14em;
            color: var(--accent);
            line-height: 1;
        }

        .tagline {
            margin-top: .35rem;
            font-size: clamp(.6rem, 2vw, .72rem);
            letter-spacing: .38em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border-radius: 18px;
            padding: clamp(1rem, 4.5vw, 1.75rem);
            width: 100%;
            max-width: 360px;
            box-shadow:
                    0 16px 48px rgba(0,0,0,.55),
                    0 0 0 1px var(--sep),
                    inset 0 1px 0 rgba(255,255,255,.04);
        }

        /* ── Win banner ── */
        .win-banner {
            display: none;
            text-align: center;
            padding: .65rem .5rem;
            margin-bottom: .9rem;
            background: rgba(90,158,114,.13);
            border: 1.5px solid var(--correct);
            border-radius: 8px;
            color: var(--correct);
            font-weight: 700;
            font-size: .95rem;
            letter-spacing: .06em;
        }
        .win-banner.show { display: block; }

        /* ── Instructions ── */
        .instructions {
            font-size: clamp(.62rem, 2vw, .7rem);
            color: var(--muted);
            text-align: center;
            line-height: 1.65;
            margin-bottom: 1rem;
        }

        /* ── Puzzle grid (4 cols × 4 rows) ── */
        .grid-wrapper {
            display: grid;
            grid-template-columns: repeat(3, 1fr) .7fr;
            grid-template-rows: repeat(3, 1fr) .7fr;
            gap: 5px;
            margin-bottom: 1.2rem;
        }

        .game-cell {
            aspect-ratio: 1;
            background: var(--cell-bg);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: clamp(1.25rem, 5vw, 1.7rem);
            color: var(--cell-text);
            cursor: pointer;
            transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
            user-select: none;
            position: relative;
        }
        .game-cell:hover { background: #e8dcc8; transform: scale(1.04); z-index: 1; }

        .game-cell.filled  { color: #3a5e8a; }
        .game-cell.source  {
            background: transparent;
            border: 2px dashed var(--accent);
        }
        .game-cell.win-flash { animation: flashGreen .55s ease forwards; }
        @keyframes flashGreen {
            0%   { background: var(--cell-bg); transform: scale(1); }
            45%  { background: #b0e4c2; transform: scale(1.09); }
            100% { background: #c8efd8; transform: scale(1); }
        }

        /* ── Sum labels ── */
        .sum-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: clamp(.7rem, 2.4vw, .88rem);
            color: var(--muted);
            transition: color .25s ease;
            line-height: 1;
        }
        .sum-cell.row-sum { border-left: 2px solid var(--sep); }
        .sum-cell.col-sum { border-top:  2px solid var(--sep); }
        .s-target  { color: var(--muted); }
        .s-current { color: var(--accent-lt); }
        .s-over    { color: var(--wrong); }
        .s-correct { color: var(--correct); }
        .s-sep     { color: var(--sep); margin: 0 1px; }

        /* ── Section label ── */
        .section-lbl {
            font-size: .62rem;
            letter-spacing: .32em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: .55rem;
        }

        /* ── Number bank ── */
        .bank {
            display: flex;
            gap: 5px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1.1rem;
        }

        .bank-tile {
            width: clamp(30px, 9vw, 40px);
            height: clamp(30px, 9vw, 40px);
            background: var(--cell-bg);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: clamp(.9rem, 3vw, 1.15rem);
            color: var(--cell-text);
            cursor: pointer;
            transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
            user-select: none;
        }
        .bank-tile:hover:not(.used):not(.selected-bank) { transform: scale(1.1); background: #e8dcc8; }
        .bank-tile.selected-bank {
            background: var(--accent);
            color: #fff;
            transform: scale(1.12);
            box-shadow: 0 4px 14px rgba(196,138,48,.5);
        }
        .bank-tile.used {
            background: var(--surface2);
            color: #5a5040;
            cursor: default;
        }

        /* ── Buttons ── */
        .btn-row { display: flex; gap: 8px; }
        .btn {
            flex: 1;
            padding: .58rem .5rem;
            border: none;
            border-radius: 8px;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: .82rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .12s ease, transform .08s ease;
        }
        .btn:active { transform: scale(.97); }
        .btn-primary   { background: var(--accent);  color: #fff; }
        .btn-primary:hover { background: var(--accent-lt); }
        .btn-secondary { background: var(--surface2); color: var(--cell-bg); }
        .btn-secondary:hover { background: #45403a; }

        /* ── Puzzle counter ── */
        .counter {
            text-align: center;
            margin-top: .7rem;
            font-size: .62rem;
            letter-spacing: .22em;
            color: #5a5040;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <h1>SUM GRID</h1>
    <div class="tagline">Place 1–9 · Match every sum</div>
</header>

<div class="card">
    <div class="win-banner" id="winBanner">✓ &nbsp;Puzzle Solved — Well Done!</div>
    <div class="instructions">
        Pick a number below, then tap a cell to place it.<br>
        Tap a placed number to pick it up again.
    </div>

    <div class="grid-wrapper" id="gameGrid"></div>

    <div class="section-lbl">Available Numbers</div>
    <div class="bank" id="numberBank"></div>

    <div class="btn-row">
        <button class="btn btn-secondary" id="btnReset">Reset</button>
        <button class="btn btn-primary"   id="btnNew">New Puzzle</button>
    </div>
    <div class="counter" id="counter"></div>
</div>

<script>
    // ── Puzzle data: [row0, row1, row2, col0, col1, col2] ──
    const PUZZLES = [
        [6,15,24,12,15,18],[7,14,24,11,15,19],[8,13,24,10,16,19],[9,12,24,10,15,20],
        [8,13,24,11,14,20],[8,15,22,10,14,21],[8,15,22, 9,15,21],[8,15,22,11,13,21],
        [7,16,22,10,14,21],[7,17,21, 9,15,21],[6,18,21,10,15,20],[8,15,22, 9,16,20],
        [6,17,22,11,14,20],[8,16,21,10,13,22],[6,17,22,10,16,19],[7,16,22, 9,16,20],
        [7,16,22,10,15,20],[8,15,22, 8,17,20],[8,17,20, 9,14,22],[8,15,22,10,13,22],
        [7,15,23,12,14,19],[7,15,23,10,16,19],[9,13,23,12,14,19],[9,13,23,10,16,19],
        [8,14,23,10,15,20],[6,16,23,11,15,19],[7,15,23,10,15,20],[9,13,23,10,15,20],
        [8,14,23, 9,16,20],[7,15,23,11,14,20],[7,15,23,11,16,18],[9,13,23, 9,15,21],
        [8,14,23,10,14,21],[7,15,23,11,15,19],[7,17,21,11,16,18],[7,17,21,10,15,20],
        [7,17,21,11,14,20],[8,15,22, 9,17,19]
    ];

    // ── State ──
    let puzzleIdx = -1;
    let puzzle    = null;
    let grid      = Array(9).fill(null);  // placed numbers
    let selected  = null;   // number in hand
    let selSrc    = null;   // grid index if lifted from cell, null if from bank
    let solved    = false;

    // ── Core logic ──
    function newGame() {
        let idx;
        do { idx = Math.floor(Math.random() * PUZZLES.length); }
        while (idx === puzzleIdx && PUZZLES.length > 1);
        puzzleIdx = idx;
        puzzle    = PUZZLES[idx];
        grid      = Array(9).fill(null);
        selected  = null;
        selSrc    = null;
        solved    = false;
        document.getElementById('winBanner').classList.remove('show');
        render();
        document.getElementById('counter').textContent =
            `Puzzle ${idx + 1} of ${PUZZLES.length}`;
    }

    function resetPuzzle() {
        grid     = Array(9).fill(null);
        selected = null;
        selSrc   = null;
        solved   = false;
        document.getElementById('winBanner').classList.remove('show');
        render();
    }

    function handleCellClick(i) {
        if (solved) return;

        if (selected !== null) {
            if (selSrc === i) {
                // Tapped source cell → cancel, put back
                grid[i] = selected;
                selected = null;
                selSrc   = null;
            } else {
                const displaced = grid[i];          // could be null
                grid[i] = selected;
                if (selSrc !== null) {
                    grid[selSrc] = displaced;         // swap or clear source cell
                }
                // If selSrc was null (from bank), displaced goes to bank automatically
                selected = null;
                selSrc   = null;
            }
        } else {
            if (grid[i] !== null) {
                selected = grid[i];
                selSrc   = i;
                grid[i]  = null;
            }
        }

        render();
        checkWin();
    }

    function handleBankClick(n) {
        if (solved) return;
        if (grid.includes(n)) return;

        if (selected === n) {
            // Tap same number → release to bank (source cell stays empty)
            selected = null;
            selSrc   = null;
        } else {
            // Switch selection: return any grid-lifted number to its source
            if (selSrc !== null) grid[selSrc] = selected;
            selected = n;
            selSrc   = null;
        }
        render();
    }

    // ── Sum helpers ──
    function rowInfo(r) {
        const vals = [grid[r*3], grid[r*3+1], grid[r*3+2]];
        const filled = vals.filter(v => v !== null);
        return { sum: filled.reduce((a,b)=>a+b,0), count: filled.length, target: puzzle[r] };
    }

    function colInfo(c) {
        const vals = [grid[c], grid[c+3], grid[c+6]];
        const filled = vals.filter(v => v !== null);
        return { sum: filled.reduce((a,b)=>a+b,0), count: filled.length, target: puzzle[3+c] };
    }

    function sumHTML(info) {
        const tgt = `<span class="s-target">${info.target}</span>`;
        const sep = `<span class="s-sep">·</span>`;

        if (info.count === 3 && info.sum === info.target) {
            return `<span class="s-correct">${info.target}</span>`;
        }
        if (info.count === 0) return tgt;

        const over    = info.sum > info.target;
        const curCls  = over ? 's-over' : 's-current';
        return `<span class="${curCls}">${info.sum}</span>${sep}${tgt}`;
    }

    // ── Win check ──
    function checkWin() {
        if (grid.some(v => v === null)) return;
        for (let r = 0; r < 3; r++) { const inf = rowInfo(r); if (inf.sum !== inf.target) return; }
        for (let c = 0; c < 3; c++) { const inf = colInfo(c); if (inf.sum !== inf.target) return; }
        solved = true;
        document.getElementById('winBanner').classList.add('show');
        document.querySelectorAll('.game-cell').forEach((el, i) =>
            setTimeout(() => el.classList.add('win-flash'), i * 55)
        );
    }

    // ── Render ──
    function render() {
        renderGrid();
        renderBank();
    }

    function renderGrid() {
        const root = document.getElementById('gameGrid');
        root.innerHTML = '';

        for (let r = 0; r < 3; r++) {
            // Three game cells
            for (let c = 0; c < 3; c++) {
                const i   = r * 3 + c;
                const div = document.createElement('div');
                div.className = 'game-cell';

                if (selSrc === i) {
                    div.classList.add('source');
                } else if (grid[i] !== null) {
                    div.classList.add('filled');
                    div.textContent = grid[i];
                }
                div.addEventListener('click', () => handleCellClick(i));
                root.appendChild(div);
            }

            // Row sum
            const ri  = rowInfo(r);
            const rs  = document.createElement('div');
            rs.className   = 'sum-cell row-sum';
            rs.innerHTML   = sumHTML(ri);
            root.appendChild(rs);
        }

        // Column sums row
        for (let c = 0; c < 3; c++) {
            const ci  = colInfo(c);
            const cs  = document.createElement('div');
            cs.className   = 'sum-cell col-sum';
            cs.innerHTML   = sumHTML(ci);
            root.appendChild(cs);
        }

        // Corner
        const corner = document.createElement('div');
        corner.className = 'sum-cell';
        root.appendChild(corner);
    }

    function renderBank() {
        const root = document.getElementById('numberBank');
        root.innerHTML = '';

        for (let n = 1; n <= 9; n++) {
            const div    = document.createElement('div');
            div.className   = 'bank-tile';
            div.textContent = n;

            const inGrid   = grid.includes(n);
            const isSel    = selected === n;

            if (inGrid) {
                div.classList.add('used');
            } else if (isSel) {
                div.classList.add('selected-bank');
                div.addEventListener('click', () => handleBankClick(n));
            } else {
                div.addEventListener('click', () => handleBankClick(n));
            }

            root.appendChild(div);
        }
    }

    // ── Wiring ──
    document.getElementById('btnNew').addEventListener('click', newGame);
    document.getElementById('btnReset').addEventListener('click', resetPuzzle);

    newGame();
</script>
</body>
</html>
