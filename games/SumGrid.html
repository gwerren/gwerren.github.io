<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #1a1713;
            --surface:   #272320;
            --surface2:  #332e28;
            --cell-bg:   #f2e8d6;
            --cell-text: #23201c;
            --accent:    #c48a30;
            --accent-lt: #dca84e;
            --correct:   #5a9e72;
            --wrong:     #b84848;
            --muted:     #7a6e5e;
            --sep:       #3e3830;
            --text:      #f2e8d6;
            --banner-bg: rgba(26,23,19,.92);
        }

        .light {
            --bg:        #f5f0e8;
            --surface:   #ede5d5;
            --surface2:  #ddd4c0;
            --cell-bg:   #ffffff;
            --cell-text: #23201c;
            --accent:    #c48a30;
            --accent-lt: #a06820;
            --correct:   #3d8a58;
            --wrong:     #b84848;
            --muted:     #8a7a6a;
            --sep:       #b8afa0;
            --text:      #23201c;
            --banner-bg: rgba(245,240,232,.95);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            background-image:
                    radial-gradient(ellipse at 20% 10%, rgba(196,138,48,.08) 0%, transparent 55%),
                    radial-gradient(ellipse at 80% 90%, rgba(90,158,114,.06) 0%, transparent 55%);
            font-family: 'Courier Prime', 'Courier New', monospace;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 2.5rem;
            gap: 1.4rem;
        }

        /* ── Header ── */
        header { text-align: center; }

        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 900;
            font-size: clamp(2rem, 9vw, 2.8rem);
            letter-spacing: .14em;
            color: var(--accent);
            line-height: 1;
        }

        .tagline {
            margin-top: .35rem;
            font-size: clamp(1rem, 3.2vw, 1.2rem);
            letter-spacing: .38em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border-radius: 18px;
            padding: clamp(1rem, 4.5vw, 1.75rem);
            width: 100%;
            max-width: 360px;
            box-shadow:
                    0 16px 48px rgba(0,0,0,.55),
                    0 0 0 1px var(--sep),
                    inset 0 1px 0 rgba(255,255,255,.04);
        }

        /* ── Win banner ── */
        .grid-container {
            position: relative;
            margin-bottom: 1rem;
        }
        .win-banner {
            display: none;
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            text-align: center;
            padding: .75rem .5rem;
            background: var(--banner-bg);
            border-top: 1.5px solid var(--correct);
            border-bottom: 1.5px solid var(--correct);
            color: var(--correct);
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: .06em;
            z-index: 10;
        }
        .win-banner.show { display: block; }

        /* ── Puzzle grid ── */
        .grid-wrapper {
            display: grid;
            gap: 5px;
        }

        .game-cell {
            aspect-ratio: 1;
            background: var(--cell-bg);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: clamp(1.25rem, 5vw, 1.7rem);
            color: var(--cell-text);
            cursor: pointer;
            transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
            user-select: none;
            position: relative;
        }
        .game-cell:hover { background: #e8dcc8; transform: scale(1.04); z-index: 1; }

        .game-cell.filled  { color: #3a5e8a; }
        .game-cell.source  {
            background: transparent;
            border: 2px dashed var(--accent);
        }
        .game-cell.win-flash { animation: flashGreen .55s ease forwards; }
        @keyframes flashGreen {
            0%   { background: var(--cell-bg); transform: scale(1); }
            45%  { background: #b0e4c2; transform: scale(1.09); }
            100% { background: #c8efd8; transform: scale(1); }
        }

        /* ── Sum labels ── */
        .sum-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: clamp(1rem, 3.2vw, 1.2rem);
            color: var(--muted);
            transition: color .25s ease;
            line-height: 1;
        }
        .sum-cell.row-sum { border-right: 2px solid var(--sep); }
        .sum-cell.col-sum { border-top:  2px solid var(--sep); }
        .s-target  { color: var(--muted); }
        .s-current { color: var(--accent-lt); }
        .s-over    { color: var(--wrong); }
        .s-correct { color: var(--correct); }
        .s-sep     { color: var(--sep); margin: 0 1px; }
        .sum-stack { display: flex; flex-direction: column; align-items: center; gap: 1px; }

        /* ── Number bank ── */
        .bank {
            display: flex;
            gap: 5px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .bank-tile {
            width: clamp(30px, 9vw, 40px);
            height: clamp(30px, 9vw, 40px);
            background: var(--cell-bg);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: clamp(1rem, 3.2vw, 1.2rem);
            color: var(--cell-text);
            cursor: pointer;
            transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
            user-select: none;
        }
        .bank-tile:hover:not(.used):not(.selected-bank) { transform: scale(1.1); background: #e8dcc8; }
        .bank-tile.selected-bank {
            background: var(--accent);
            color: #fff;
            transform: scale(1.12);
            box-shadow: 0 4px 14px rgba(196,138,48,.5);
        }
        .bank-tile.used {
            background: var(--surface2);
            color: #5a5040;
            cursor: default;
        }

        /* ── Size selector ── */
        .size-row { display: flex; gap: 8px; margin-bottom: .6rem; }
        .btn-size {
            flex: 1;
            padding: .38rem .2rem;
            border: 1.5px solid var(--sep);
            border-radius: 8px;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            background: transparent;
            color: var(--muted);
            transition: background .12s ease, color .12s ease, border-color .12s ease;
        }
        .btn-size:hover { border-color: var(--accent); color: var(--accent-lt); }
        .btn-size.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* ── Buttons ── */
        .btn-row { display: flex; gap: 8px; margin-bottom: 2rem; }
        .btn {
            flex: 1;
            padding: .58rem .5rem;
            border: none;
            border-radius: 8px;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .12s ease, transform .08s ease;
        }
        .btn:active { transform: scale(.97); }
        .btn-primary   { background: var(--accent);  color: #fff; }
        .btn-primary:hover { background: var(--accent-lt); }
        .btn-secondary { background: var(--surface2); color: var(--text); }
        .btn-secondary:hover { background: #45403a; }
        .light .btn-secondary:hover { background: #c8bfb0; }

        /* ── Theme toggle ── */
        .btn-theme {
            flex-shrink: 0;
            width: 2.2rem;
            padding: .38rem .2rem;
            border: 1.5px solid transparent;
            border-radius: 8px;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            background: #f2e8d6;
            color: #23201c;
            transition: background .2s ease, color .2s ease;
        }
        .light .btn-theme {
            background: #23201c;
            color: #f2e8d6;
        }
    </style>
</head>
<body>

<header>
    <h1>SUM GRID</h1>
    <div class="tagline">Place the numbers<br>match every sum</div>
</header>

<div class="card">
    <div class="size-row" id="sizeRow">
        <button class="btn-theme" id="btnTheme">L</button>
        <button class="btn-size" data-idx="0">2×3</button>
        <button class="btn-size active" data-idx="1">3×3</button>
        <button class="btn-size" data-idx="2">3×4</button>
        <button class="btn-size" data-idx="3">4×4</button>
    </div>
    <div class="btn-row">
        <button class="btn btn-secondary" id="btnReset">Reset</button>
        <button class="btn btn-primary"   id="btnNew">New Puzzle</button>
    </div>
    <div class="grid-container">
        <div class="win-banner" id="winBanner">✓ &nbsp;Puzzle Solved&nbsp; ✓<br>✓ &nbsp;Well Done&nbsp; ✓</div>
        <div class="grid-wrapper" id="gameGrid"></div>
    </div>
    <div class="bank" id="numberBank"></div>
</div>

<script>
    // ── Grid size config ──
    const GRID_SIZES = [
        { label: '2×3', rows: 2, cols: 3 },
        { label: '3×3', rows: 3, cols: 3 },
        { label: '3×4', rows: 3, cols: 4 },
        { label: '4×4', rows: 4, cols: 4 },
    ];
    let gridSize = GRID_SIZES[1];

    // ── Game state ──
    const state = {
        puzzle:   null,   // target row/col sums
        grid:     [],     // placed numbers (null = empty)
        selected: null,   // number currently in hand
        selSrc:   null,   // grid index if lifted from a cell, null if from bank
        solved:   false,
    };

    // ── Target sum generator ──
    function generateTargetSums() {
        const { rows, cols } = gridSize;
        const count = rows * cols;
        const nums = Array.from({ length: count }, (_, i) => i + 1);
        for (let i = nums.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [nums[i], nums[j]] = [nums[j], nums[i]];
        }
        const rowSums = [];
        for (let r = 0; r < rows; r++) {
            let s = 0;
            for (let c = 0; c < cols; c++) s += nums[r * cols + c];
            rowSums.push(s);
        }
        const colSums = [];
        for (let c = 0; c < cols; c++) {
            let s = 0;
            for (let r = 0; r < rows; r++) s += nums[r * cols + c];
            colSums.push(s);
        }
        return [...rowSums, ...colSums];
    }

    // ── Core logic ──
    function clearBoard() {
        state.grid     = Array(gridSize.rows * gridSize.cols).fill(null);
        state.selected = null;
        state.selSrc   = null;
        state.solved   = false;
        document.getElementById('winBanner').classList.remove('show');
    }

    function newGame() {
        state.puzzle = generateTargetSums();
        clearBoard();
        render();
    }

    function resetPuzzle() {
        clearBoard();
        render();
    }

    function handleCellClick(i) {
        if (state.solved) return;

        if (state.selected !== null) {
            if (state.selSrc === i) {
                // Tapped source cell → cancel, put back
                state.grid[i]  = state.selected;
                state.selected = null;
                state.selSrc   = null;
            } else {
                const displaced = state.grid[i];
                state.grid[i]   = state.selected;
                if (state.selSrc !== null) {
                    state.grid[state.selSrc] = displaced;  // swap or clear source cell
                }
                // If selSrc was null (from bank), displaced goes to bank automatically
                state.selected = null;
                state.selSrc   = null;
            }
        } else {
            if (state.grid[i] !== null) {
                state.selected = state.grid[i];
                state.selSrc   = i;
                state.grid[i]  = null;
            }
        }

        render();
        checkWin();
    }

    function handleBankClick(n) {
        if (state.solved) return;

        if (state.grid.includes(n)) {
            // Clicking a used tile pulls it back to the bank
            state.grid[state.grid.indexOf(n)] = null;
            render();
            return;
        }

        if (state.selected === n) {
            // Tap same number → release to bank (source cell stays empty)
            state.selected = null;
            state.selSrc   = null;
        } else {
            // Switch selection: return any grid-lifted number to its source
            if (state.selSrc !== null) state.grid[state.selSrc] = state.selected;
            state.selected = n;
            state.selSrc   = null;
        }
        render();
    }

    // ── Sum helpers ──
    function rowInfo(r) {
        const { cols } = gridSize;
        const vals   = Array.from({ length: cols }, (_, c) => state.grid[r * cols + c]);
        const filled = vals.filter(v => v !== null);
        return { sum: filled.reduce((a, b) => a + b, 0), count: filled.length, total: cols, target: state.puzzle[r] };
    }

    function colInfo(c) {
        const { rows, cols } = gridSize;
        const vals   = Array.from({ length: rows }, (_, r) => state.grid[r * cols + c]);
        const filled = vals.filter(v => v !== null);
        return { sum: filled.reduce((a, b) => a + b, 0), count: filled.length, total: rows, target: state.puzzle[rows + c] };
    }

    function sumHTML(info, stacked = false) {
        const tgt = `<span class="s-target">${info.target}</span>`;

        if (info.count === info.total && info.sum === info.target) {
            return `<span class="s-correct">${info.target}</span>`;
        }
        if (info.count === 0) return tgt;

        const over   = info.sum > info.target;
        const curCls = over ? 's-over' : 's-current';
        const cur    = `<span class="${curCls}">${info.sum}</span>`;
        const sep    = `<span class="s-sep">·</span>`;

        if (stacked) return `<span class="sum-stack">${cur}${sep}${tgt}</span>`;
        return `${cur}${sep}${tgt}`;
    }

    // ── Win check ──
    function checkWin() {
        if (state.grid.some(v => v === null)) return;
        for (let r = 0; r < gridSize.rows; r++) { const inf = rowInfo(r); if (inf.sum !== inf.target) return; }
        for (let c = 0; c < gridSize.cols; c++) { const inf = colInfo(c); if (inf.sum !== inf.target) return; }
        state.solved = true;
        document.getElementById('winBanner').classList.add('show');
        document.querySelectorAll('.game-cell').forEach((el, i) =>
            setTimeout(() => el.classList.add('win-flash'), i * 55)
        );
    }

    // ── Render ──
    function render() {
        renderGrid();
        renderBank();
    }

    function renderGrid() {
        const { rows, cols } = gridSize;
        const root = document.getElementById('gameGrid');
        root.innerHTML = '';
        root.style.gridTemplateColumns = `.7fr repeat(${cols}, 1fr)`;
        root.style.gridTemplateRows    = `repeat(${rows}, 1fr) .7fr`;
        const bannerTop = (rows / 2) / (rows + 0.74) * 100;
        document.getElementById('winBanner').style.top = `${bannerTop.toFixed(1)}%`;

        for (let r = 0; r < rows; r++) {
            const ri = rowInfo(r);
            const rs = document.createElement('div');
            rs.className = 'sum-cell row-sum';
            rs.innerHTML = sumHTML(ri, true);
            root.appendChild(rs);

            for (let c = 0; c < cols; c++) {
                const i   = r * cols + c;
                const div = document.createElement('div');
                div.className = 'game-cell';
                if (state.selSrc === i) {
                    div.classList.add('source');
                } else if (state.grid[i] !== null) {
                    div.classList.add('filled');
                    div.textContent = state.grid[i];
                }
                div.addEventListener('click', () => handleCellClick(i));
                root.appendChild(div);
            }
        }

        const corner = document.createElement('div');
        corner.className = 'sum-cell';
        root.appendChild(corner);

        for (let c = 0; c < cols; c++) {
            const ci = colInfo(c);
            const cs = document.createElement('div');
            cs.className = 'sum-cell col-sum';
            cs.innerHTML = sumHTML(ci);
            root.appendChild(cs);
        }
    }

    function renderBank() {
        const root = document.getElementById('numberBank');
        root.innerHTML = '';

        for (let n = 1; n <= gridSize.rows * gridSize.cols; n++) {
            const div = document.createElement('div');
            div.className   = 'bank-tile';
            div.textContent = n;

            if (state.grid.includes(n)) div.classList.add('used');
            if (state.selected === n)   div.classList.add('selected-bank');
            div.addEventListener('click', () => handleBankClick(n));

            root.appendChild(div);
        }
    }

    // ── Wiring ──
    document.querySelectorAll('.btn-size').forEach(btn => {
        btn.addEventListener('click', () => {
            gridSize = GRID_SIZES[+btn.dataset.idx];
            document.querySelectorAll('.btn-size').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            newGame();
        });
    });
    document.getElementById('btnNew').addEventListener('click', newGame);
    document.getElementById('btnReset').addEventListener('click', resetPuzzle);
    document.getElementById('btnTheme').addEventListener('click', () => {
        const isLight = document.documentElement.classList.toggle('light');
        document.getElementById('btnTheme').textContent = isLight ? 'D' : 'L';
    });

    newGame();
</script>
</body>
</html>
